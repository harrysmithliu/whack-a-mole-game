<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="Responsive browser-based Whack-a-Mole game built with HTML, CSS, and JavaScript."
    />
    <title>Whack-a-Mole Game</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div id="viewport-stage" class="viewport-stage">
      <main id="app-shell" class="app-shell">
        <header class="topbar">
          <div class="stats" aria-label="Game stats">
            <div class="stat-card">
              <span class="stat-label">Score</span>
              <strong id="score">0</strong>
            </div>
            <div class="stat-card">
              <span class="stat-label">Time</span>
              <strong id="timer">30</strong>
            </div>
            <div class="stat-card">
              <span class="stat-label">Best</span>
              <strong id="best-score">0</strong>
            </div>
          </div>
        </header>

        <p class="designed-by">Author: harrysmithliu</p>

        <section class="game-panel">
          <div
            id="game-board"
            class="game-board"
            aria-label="Whack-a-Mole board"
          >
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div class="board-cell" aria-hidden="true"></div>
            <div id="status-overlay" class="status-overlay" aria-live="polite" aria-atomic="true"></div>
          </div>
        </section>

        <section class="controls" aria-label="Game controls">
          <div class="start-control">
            <button id="start-button" class="button primary" type="button" aria-haspopup="true" aria-expanded="false">
              Start Game
            </button>
            <div id="difficulty-menu" class="difficulty-menu" aria-label="Difficulty selection" hidden>
              <button class="difficulty-option" type="button" data-difficulty="hard">
                Hard
              </button>
              <button class="difficulty-option" type="button" data-difficulty="medium">
                Medium
              </button>
              <button class="difficulty-option" type="button" data-difficulty="easy">
                Easy
              </button>
            </div>
          </div>
          <button id="reset-button" class="button secondary" type="button">
            Reset
          </button>
        </section>
      </main>
    </div>

    <script src="./src/scripts/app.js" defer></script>
  </body>
</html>
